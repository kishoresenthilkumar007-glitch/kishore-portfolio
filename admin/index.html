<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css?v=5"> <!-- Base styles -->
    <link rel="stylesheet" href="../admin/admin.css?v=5"> <!-- Admin specific styles -->
</head>

<body>
    <div class="circuit-bg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo">&lt;Kishore's Portfolio / Admin&gt;</a>
            <ul class="nav-links">
                <li><a href="/" class="social-btn"><i class="fas fa-eye"></i> View Live Site</a></li>
                <li><button id="save-btn" class="social-btn primary-btn"><i class="fas fa-save"></i> Save
                        Changes</button></li>
            </ul>
        </div>
    </nav>

    <main class="admin-container section">
        <div class="hero-content" style="text-align: center; margin-bottom: 2rem; margin-top: 5rem;">
            <p class="greeting">System Access Granted</p>
            <h1 class="glitch" data-text="Admin Area">Admin Area</h1>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="toast hidden">
            <i class="fas fa-check-circle"></i> <span>Saved successfully!</span>
        </div>

        <!-- Authentication Overlay -->
        <div id="login-overlay" class="login-overlay">
            <div class="glass-card login-card">
                <h2><i class="fas fa-lock"></i> Secure Admin Access</h2>
                <p>Please authenticate via Supabase to modify data.</p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" class="glass-input" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" class="glass-input" placeholder="••••••••">
                </div>
                <button id="auth-btn" class="primary-btn social-btn" style="width: 100%; margin-top: 1rem;"><i class="fas fa-sign-in-alt"></i> Authenticate</button>
                <p id="auth-error" style="color: #ff5555; margin-top: 1rem; font-size: 0.9rem; display: none;"></p>
            </div>
        </div>

        <div id="admin-editor-grid" style="display: none;">
            
            <!-- TAB BUTTONS -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-target="tab-skills">Skills & Tech</button>
                <button class="tab-btn" data-target="tab-projects">Projects</button>
                <button class="tab-btn" data-target="tab-achievements">Achievements</button>
            </div>

            <!-- SKILLS -->
            <div class="editor-section glass-card tab-content active" id="tab-skills">
                <h2><i class="fas fa-cogs"></i> Skills & Technologies</h2>
                <div class="form-group">
                    <label>Programming Languages (comma separated)</label>
                    <input type="text" id="skills-languages" class="glass-input" placeholder="e.g. Python, C++, JavaScript">
                </div>
                <div class="form-group">
                    <label>Libraries & Frameworks (comma separated)</label>
                    <input type="text" id="skills-libraries" class="glass-input" placeholder="e.g. TensorFlow, React, Flask">
                </div>
                <div class="form-group">
                    <label>Developer Tools (comma separated)</label>
                    <input type="text" id="skills-tools" class="glass-input" placeholder="e.g. Git, Docker, AWS">
                </div>
            </div>

            <!-- PROJECTS -->
            <div class="editor-section glass-card tab-content" id="tab-projects">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin-bottom: 0;"><i class="fas fa-project-diagram"></i> Projects Portfolio</h2>
                    <button id="add-proj-btn" class="social-btn primary-btn" style="padding: 8px 15px; font-size: 0.9rem;"><i class="fas fa-plus"></i> Add Project</button>
                </div>
                <div id="projects-container" class="dynamic-list">
                    <!-- Projects injected securely here -->
                </div>
            </div>

            <!-- ACHIEVEMENTS -->
            <div class="editor-section glass-card tab-content" id="tab-achievements">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin-bottom: 0;"><i class="fas fa-trophy"></i> Achievements</h2>
                    <button id="add-achv-btn" class="social-btn primary-btn" style="padding: 8px 15px; font-size: 0.9rem;"><i class="fas fa-plus"></i> Add Cert</button>
                </div>
                <div id="achievements-container" class="dynamic-list">
                    <!-- Achievements injected securely here -->
                </div>
            </div>

        </div>
    </main>

    <script src="../admin/admin.js?v=6"></script>
</body>

</html>
